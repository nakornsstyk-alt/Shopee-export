<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Order Exporter</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@400;600;700;800&display=swap');
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  :root{
    --bg:#0d0d0f;--surface:#161618;--border:#2a2a2e;
    --accent:#ff5722;--green:#4caf7d;--yellow:#ffc14f;
    --text:#f0ede8;--muted:#6b6b75;--r:10px;
  }
  body{width:360px;background:var(--bg);color:var(--text);font-family:'Syne',sans-serif;font-size:13px}

  .header{padding:16px 18px 12px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px}
  .logo{width:32px;height:32px;background:var(--accent);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0}
  .header-text h1{font-size:14px;font-weight:800}
  .header-text p{font-size:10px;color:var(--muted);margin-top:1px}
  .badge{margin-left:auto;background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:3px 9px;font-family:'DM Mono',monospace;font-size:10px;color:var(--muted)}
  .badge span{color:var(--accent);font-weight:600}

  .section{padding:12px 18px;border-bottom:1px solid var(--border)}
  .section-label{font-size:10px;font-weight:700;letter-spacing:1.2px;text-transform:uppercase;color:var(--muted);margin-bottom:8px}

  .tab-list{display:flex;flex-direction:column;gap:5px}
  .tab-item{display:flex;align-items:center;gap:8px;background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:8px 10px}
  .tab-favicon{font-size:14px;flex-shrink:0}
  .tab-info{flex:1;min-width:0}
  .tab-title{font-size:12px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .tab-url{font-size:10px;color:var(--muted);font-family:'DM Mono',monospace;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .tab-status{font-size:10px;font-family:'DM Mono',monospace;padding:2px 7px;border-radius:20px;flex-shrink:0}
  .tab-status.idle   {background:#1e1e24;color:var(--muted)}
  .tab-status.running{background:#2a1f0a;color:var(--yellow)}
  .tab-status.done   {background:#0d2018;color:var(--green)}
  .tab-status.error  {background:#2a0d0d;color:#ff6b6b}
  .tab-btn{background:none;border:1px solid var(--border);border-radius:6px;color:var(--muted);cursor:pointer;padding:3px 8px;font-size:10px;font-family:'Syne',sans-serif;transition:all .15s;flex-shrink:0}
  .tab-btn:hover{background:var(--accent);border-color:var(--accent);color:#fff}
  .tab-btn:disabled{opacity:0.4;cursor:not-allowed}
  .no-tabs{text-align:center;color:var(--muted);font-size:12px;padding:14px 0;line-height:1.8}
  .no-tabs a{color:var(--accent);cursor:pointer;text-decoration:none}

  .date-presets{display:flex;gap:6px;flex-wrap:nowrap;margin-bottom:10px}
  .preset-btn{
    padding:5px 12px;border-radius:20px;
    border:1px solid var(--border);background:var(--surface);
    color:var(--muted);font-size:11px;
    font-family:'Syne',sans-serif;font-weight:600;
    cursor:pointer;
    pointer-events:auto;
    user-select:none;
    -webkit-user-select:none;
    transition:all .15s;
  }
  .preset-btn.active{background:var(--accent);border-color:var(--accent);color:#fff}
  .preset-btn:hover{background:var(--accent);border-color:var(--accent);color:#fff}

  .date-row{display:flex;gap:6px;align-items:center}
  .date-row input[type="date"]{
    flex:1;background:var(--surface);border:1px solid var(--border);
    border-radius:7px;color:var(--text);font-family:'DM Mono',monospace;
    font-size:11px;padding:7px 8px;outline:none;color-scheme:dark;
    cursor:pointer;transition:border-color .15s;
    pointer-events:auto;
  }
  .date-row input[type="date"]:not(:disabled):hover,
  .date-row input[type="date"]:focus{border-color:var(--accent)}
  .date-row input[type="date"]:disabled{opacity:0.3;cursor:not-allowed;pointer-events:none}
  .date-sep{color:var(--muted);font-size:11px;flex-shrink:0}

  .schedule-row{display:flex;align-items:center;gap:10px}
  .toggle{position:relative;width:36px;height:20px;flex-shrink:0}
  .toggle input{opacity:0;width:0;height:0;position:absolute}
  .toggle-slider{position:absolute;inset:0;background:var(--border);border-radius:20px;cursor:pointer;transition:background .2s}
  .toggle-slider::before{content:'';position:absolute;width:14px;height:14px;left:3px;top:3px;background:var(--muted);border-radius:50%;transition:transform .2s,background .2s}
  .toggle input:checked+.toggle-slider{background:var(--accent)}
  .toggle input:checked+.toggle-slider::before{transform:translateX(16px);background:#fff}
  .toggle-label{font-size:12px;font-weight:600}
  .time-wrap{margin-left:auto}
  .time-wrap input[type="time"]{background:var(--surface);border:1px solid var(--border);border-radius:7px;color:var(--text);font-family:'DM Mono',monospace;font-size:12px;padding:5px 9px;width:82px;outline:none;color-scheme:dark;transition:border-color .15s}
  .next-run{font-size:10px;color:var(--muted);margin-top:7px;font-family:'DM Mono',monospace}
  .next-run span{color:var(--yellow)}

  .cta{padding:12px 18px 14px}
  .export-all-btn{width:100%;background:var(--accent);color:#fff;border:none;border-radius:var(--r);padding:13px;font-family:'Syne',sans-serif;font-size:14px;font-weight:800;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;transition:background .15s,transform .1s;overflow:hidden;position:relative}
  .export-all-btn::before{content:'';position:absolute;top:0;left:-100%;width:60px;height:100%;background:rgba(255,255,255,.15);transform:skewX(-20deg);transition:left .4s}
  .export-all-btn:hover::before{left:120%}
  .export-all-btn:hover{background:#e64a19}
  .export-all-btn:active{transform:scale(.98)}
  .export-all-btn:disabled{background:var(--border);color:var(--muted);cursor:not-allowed}

  .refresh-btn{width:100%;background:none;color:var(--muted);border:1px solid var(--border);border-radius:var(--r);padding:9px;font-family:'Syne',sans-serif;font-size:12px;font-weight:600;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:6px;transition:all .15s;margin-top:7px}
  .refresh-btn:hover{border-color:var(--accent);color:var(--accent)}
  .refresh-btn:active{transform:scale(.98)}
  .refresh-btn:disabled{opacity:0.4;cursor:not-allowed}

  .log-strip{padding:6px 18px 12px;font-family:'DM Mono',monospace;font-size:10px;color:var(--muted);min-height:28px}
  .log-entry.ok  {color:var(--green)}
  .log-entry.err {color:#ff6b6b}
  .log-entry.warn{color:var(--yellow)}

  @keyframes spin{to{transform:rotate(360deg)}}
  .spinner{width:13px;height:13px;border:2px solid rgba(255,255,255,.25);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite}
  .platform-badge{font-size:9px;font-family:'DM Mono',monospace;padding:2px 6px;border-radius:20px;background:var(--border);color:var(--muted);flex-shrink:0;white-space:nowrap}

  ::-webkit-scrollbar{width:4px}
  ::-webkit-scrollbar-track{background:var(--bg)}
  ::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
</style>
</head>
<body>

<div class="header">
  <div class="logo">📦</div>
  <div class="header-text">
    <h1>Order Exporter</h1>
    <p>Multi-platform · Multi-brand</p>
  </div>
  <div class="badge"><span id="tabCount">—</span> tabs</div>
</div>

<!-- Seller Tabs -->
<div class="section">
  <div class="section-label">Seller Tabs</div>
  <div id="tabList"><div class="no-tabs">Loading…</div></div>
</div>

<!-- Date Range -->
<div class="section">
  <div class="section-label">Date Range</div>
  <div class="date-presets">
    <button class="preset-btn active" id="btn-D-1">Yesterday</button>
    <button class="preset-btn"        id="btn-D-7">Last 7d</button>
    <button class="preset-btn"        id="btn-D-30">Last 30d</button>
    <button class="preset-btn"        id="btn-custom">Custom</button>
  </div>
  <div class="date-row">
    <input type="date" id="dateFrom" disabled>
    <span class="date-sep">→</span>
    <input type="date" id="dateTo"   disabled>
  </div>
</div>

<!-- Schedule -->
<div class="section">
  <div class="section-label">Auto Schedule</div>
  <div class="schedule-row">
    <label class="toggle">
      <input type="checkbox" id="schedToggle">
      <span class="toggle-slider"></span>
    </label>
    <span class="toggle-label">Run daily at</span>
    <div class="time-wrap">
      <input type="time" id="schedTime" value="08:00">
    </div>
  </div>
  <div class="next-run" id="nextRun"></div>
</div>

<div class="cta">
  <button class="export-all-btn" id="exportBtn">
    <span id="btnIcon">⬇</span>
    <span id="btnText">Export All Brands Now</span>
  </button>
  <button class="refresh-btn" id="refreshBtn">
    ↺ Refresh All Pages to Order List
  </button>
</div>
<div class="log-strip" id="logStrip"></div>

<script src="popup.js"></script>
</body>
</html>
